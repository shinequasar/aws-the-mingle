spring:
  datasource:
    url: jdbc:mysql://localhost:3306/hunting_pocha?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        default_batch_fetch_size: 100
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  sql:
    init:
      mode: always

app:
  jwt:
    secret: ${JWT_SECRET:defaultSecretKeyForDevelopmentOnlyMustBeAtLeast256Bits!!}
    expiration: 57600000
  upload:
    path: ${UPLOAD_PATH:./uploads}
    allowed-extensions: jpg,jpeg,png,gif,webp

logging:
  level:
    root: INFO
    com.huntingpocha: DEBUG
  file:
    name: logs/application.log
  logback:
    rollingpolicy:
      max-history: 30
